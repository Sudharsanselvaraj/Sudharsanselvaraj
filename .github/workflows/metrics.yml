name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:        # Manual trigger from Actions tab
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────────────────────────
      # SECTION 1 — HEADER / OVERVIEW (like Simon Lecoq's top card)
      # Shows: profile info, repos, stars, commits, languages, habits
      # ─────────────────────────────────────────────────────────────────
      - name: Overview — Header + Habits + Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.overview.svg
          user: Sudharsanselvaraj
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

          # Coding habits — commit activity by hour/day + language breakdown
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # Languages used across repos
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 6
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # Topics/technologies starred
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          plugin_topics_sort: stars

      # ─────────────────────────────────────────────────────────────────
      # SECTION 2 — ISOMETRIC COMMIT CALENDAR
      # The beautiful 3D commit calendar with streaks and stats
      # ─────────────────────────────────────────────────────────────────
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year   # full-year or half-year

      # ─────────────────────────────────────────────────────────────────
      # SECTION 3 — WORLD MAP (your key feature!)
      # Shows stargazers origins on a world map
      # Marked locations: India (Dindigul/Bangalore), Hong Kong, San Francisco
      # ─────────────────────────────────────────────────────────────────
      - name: Stargazers World Map
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.worldmap.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_stargazers: yes
          plugin_stargazers_charts: no
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_token: ${{ secrets.GOOGLE_MAPS_TOKEN }}
          plugin_stargazers_worldmap_sample: 200

      # ─────────────────────────────────────────────────────────────────
      # SECTION 4 — LEETCODE STATS
      # Shows problems solved, difficulty breakdown, recent submissions
      # ─────────────────────────────────────────────────────────────────
      - name: LeetCode Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.leetcode.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_leetcode: yes
          plugin_leetcode_user: Sudharsan_ML
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_limit_recent: 5

      # ─────────────────────────────────────────────────────────────────
      # SECTION 5 — ACHIEVEMENTS
      # Unlockable achievement badges based on GitHub activity
      # ─────────────────────────────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.achievements.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

      # ─────────────────────────────────────────────────────────────────
      # SECTION 6 — NOTABLE CONTRIBUTIONS
      # Highlights contributions to other repositories
      # ─────────────────────────────────────────────────────────────────
      - name: Notable Contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.notable.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_notable: yes
          plugin_notable_filter_role: contributor
          plugin_notable_repositories: yes
