name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── MAIN ALL-IN-ONE PANEL ─────────────────────────────────────────────
      # Token needs scopes: read:user, repo, public_repo, read:org
      - name: All-in-one metrics panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.overview.svg
          base: header, activity, community, repositories
          base_indepth: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_topics: yes
          plugin_topics_limit: 30
          plugin_topics_mode: icons
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 10

      # ── ISOMETRIC CALENDAR ────────────────────────────────────────────────
      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata

      # ── LEETCODE ──────────────────────────────────────────────────────────
      - name: LeetCode
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics.leetcode.svg
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: Sudharsan_ML
          plugin_leetcode_sections: solved, skills, recent
          config_timezone: Asia/Kolkata

      # ── ACHIEVEMENTS ──────────────────────────────────────────────────────
      # FIX: achievements needs token with scopes: read:user + repo + read:org
      # Go to: GitHub Settings → Developer settings → Personal Access Tokens
      # → Regenerate METRICS_TOKEN with these scopes checked:
      #   ✅ repo  ✅ read:user  ✅ read:org  ✅ public_repo
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
          config_timezone: Asia/Kolkata

      # ── NOTABLE CONTRIBUTIONS ─────────────────────────────────────────────
      - name: Notable contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.notable.svg
          base: ""
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          config_timezone: Asia/Kolkata
