name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── OVERVIEW: header + habits + languages + topics ──────────────
      - name: Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.overview.svg
          user: Sudharsanselvaraj
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_charts_type: bar

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 0%

          plugin_topics: yes
          plugin_topics_limit: 24
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          plugin_lines: yes

      # ── ISOMETRIC CALENDAR ─────────────────────────────────────────
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── WORLD MAP ──────────────────────────────────────────────────
      # The map shows stargazers' locations geocoded via Google Maps API
      # Your experience locations (HK, SF, Bangalore) need Google token
      - name: Stargazers World Map
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.worldmap.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_stargazers: yes
          plugin_stargazers_charts: no
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_token: ${{ secrets.GOOGLE_MAPS_TOKEN }}
          plugin_stargazers_worldmap_sample: 200

      # ── LEETCODE ───────────────────────────────────────────────────
      - name: LeetCode
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.leetcode.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_leetcode: yes
          plugin_leetcode_user: Sudharsan_ML
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_limit_recent: 5

      # ── ACHIEVEMENTS (fixed — needs older metrics version) ─────────
      - name: Achievements
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.achievements.svg
          user: Sudharsanselvaraj
          template: classic
          base: ""
          config_timezone: Asia/Kolkata

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
          plugin_achievements_ignored: >-
            octonaut
