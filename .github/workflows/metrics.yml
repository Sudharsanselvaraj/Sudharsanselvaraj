name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:          # allows manual trigger
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── OVERVIEW ──────────────────────────────────────────────────────────
      - name: Overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.overview.svg
          base: header, activity, community, repositories
          base_indepth: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          config_timezone: Asia/Kolkata
          config_display: large

      # ── ISOMETRIC CALENDAR ────────────────────────────────────────────────
      - name: Isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata

      # ── WORLD MAP ─────────────────────────────────────────────────────────
      - name: Stargazers world map
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.worldmap.svg
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_token: ${{ secrets.GOOGLE_MAP_TOKEN }}
          config_timezone: Asia/Kolkata

      # ── LEETCODE ──────────────────────────────────────────────────────────
      - name: LeetCode stats
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: metrics.leetcode.svg
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: Sudharsan_ML
          plugin_leetcode_sections: solved, skills, recent
          config_timezone: Asia/Kolkata

      # ── ACHIEVEMENTS ──────────────────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
          config_timezone: Asia/Kolkata

      # ── NOTABLE CONTRIBUTIONS ─────────────────────────────────────────────
      - name: Notable contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.notable.svg
          base: ""
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          config_timezone: Asia/Kolkata
